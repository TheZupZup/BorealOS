name: Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Run repository checks
        run: scripts/check.sh
