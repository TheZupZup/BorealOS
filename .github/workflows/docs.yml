name: Docs CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      # Offline mode validates relative links and in-document heading anchors
      # without making network requests, so flaky external links never break CI.
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress '**/*.md'
          fail: true

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Lint YAML
        run: pipx run yamllint .
