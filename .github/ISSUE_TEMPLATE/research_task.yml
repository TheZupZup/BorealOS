name: Research task
description: Propose or track a research question (Android, LineageOS, Pixel 8 Pro, build, privacy).
title: "[Research]: "
labels: ["research"]
body:
  - type: markdown
    attributes:
      value: |
        BorealOS is in a research-first phase, so well-scoped research tasks are some of the most valuable contributions.

        Use this template to capture a question worth investigating — for example AOSP/LineageOS build details, Pixel 8 Pro (`husky`) bring-up, kernel and device-tree specifics, signing and OTA, or privacy approaches. The goal is to turn an open question into shareable notes the project can build on.
  - type: dropdown
    id: area
    attributes:
      label: Research area
      description: The main topic this research covers.
      multiple: true
      options:
        - Android / AOSP
        - LineageOS
        - Pixel 8 Pro (husky)
        - Build system and tooling
        - Kernel and device trees
        - Signing and OTA updates
        - Privacy and security
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Research question or goal
      description: What do we want to find out, and why does it matter for BorealOS?
      placeholder: e.g. What is the recommended LineageOS branch and manifest setup for husky?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Background and context (optional)
      description: What is already known, and what prompted this question?
    validations:
      required: false
  - type: textarea
    id: questions
    attributes:
      label: Specific questions to answer
      description: Break the topic into concrete sub-questions where possible.
      placeholder: |
        - Which upstream branch should we track?
        - What are the known hardware quirks for this device?
        - Which vendor blobs or firmware are required?
    validations:
      required: true
  - type: textarea
    id: resources
    attributes:
      label: Useful resources or starting points (optional)
      description: Links to upstream docs, wikis, threads, or prior work.
      placeholder: |
        - https://wiki.lineageos.org/
        - https://source.android.com/
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: What does "done" look like? (optional)
      description: The deliverable — for example notes added under docs/, or a clear recommendation.
    validations:
      required: false
