name: Feature request
description: Suggest a feature or improvement for BorealOS.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea for BorealOS!

        **Heads up:** the project is still in research and planning, with no flashable builds yet. Great ideas are very welcome — many will be captured on the roadmap and revisited once a build environment exists. Clear motivation and scope make a request much easier to act on.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short, clear description of the feature or improvement.
      placeholder: In one or two sentences, what would you like to see?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation — what problem does this solve?
      description: Describe the problem or need behind this request.
      placeholder: What is frustrating, missing, or harder than it should be today?
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: User benefit — who benefits, and how?
      description: Explain who this helps and how it improves their experience.
      placeholder: e.g. Privacy-focused users would get safer defaults without manual setup.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and considerations
      description: |
        What is in scope and out of scope? Note any trade-offs, and how this fits the privacy-first, minimal goals of BorealOS.
      placeholder: |
        In scope: ...
        Out of scope: ...
        Considerations: ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution or ideas (optional)
      description: If you have an approach in mind, describe it here.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: Other approaches you thought about, and why this one is preferable.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Relevant area
      description: Which part of the project does this relate to?
      multiple: true
      options:
        - Privacy and security
        - Build system and tooling
        - Android / AOSP
        - Pixel 8 Pro (husky)
        - Documentation
        - Developer experience
        - Other
    validations:
      required: false
