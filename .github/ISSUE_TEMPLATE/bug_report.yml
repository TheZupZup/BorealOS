name: Bug report
description: Report a problem with the BorealOS docs, scripts, configuration, or CI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report and help improve BorealOS!

        **Heads up:** BorealOS is in an early planning and research phase and has **no flashable builds yet**. Reports about device flashing, booting, or full Android builds are likely out of scope for now — that work does not exist in this repository.

        Reports about the documentation, helper scripts, configuration, and CI are very welcome.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you begin
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I understand BorealOS has no flashable builds yet, so flashing and full-build issues may be limited.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the project does this affect?
      options:
        - Documentation
        - Helper scripts (scripts/)
        - Configuration (config/)
        - Continuous integration (CI)
        - Repository or project meta
        - Not sure / other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the problem.
      placeholder: Describe what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Describe the behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce the problem.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See the error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        If relevant, share your OS, shell, and tool versions (for example the
        output of `./scripts/borealos-doctor.sh`). Skip anything that does not apply.
      placeholder: |
        OS: e.g. Ubuntu 24.04
        Shell: e.g. bash 5.2
        Tools: git 2.43, python 3.12, ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste any relevant log output. This is rendered as code, so no backticks needed.
      render: shell
    validations:
      required: false
