name: Documentation
description: Report a documentation issue or suggest an improvement. First-timers welcome!
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping make the BorealOS docs clearer!

        Documentation is one of the best ways to contribute right now, and no change is too small — fixing a typo, clarifying a sentence, or pointing out something confusing all help. You do not need to be an Android expert to open this issue.
  - type: dropdown
    id: kind
    attributes:
      label: What kind of documentation issue is this?
      options:
        - Typo or small error
        - Something is unclear or confusing
        - Information is missing
        - Suggestion or new doc idea
        - Other
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where is it?
      description: The page, file, or section this is about (a link or path is great).
      placeholder: e.g. README.md, docs/OVERVIEW.md, or a heading title
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: What is the issue or suggestion?
      description: Describe what is wrong, missing, or could be clearer.
      placeholder: Tell us what you noticed and what would help.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested wording or change (optional)
      description: If you have an idea for the fix, share it here. Drafts are welcome.
    validations:
      required: false
  - type: checkboxes
    id: help
    attributes:
      label: Would you like to help?
      options:
        - label: I would be willing to open a pull request for this change.
          required: false
