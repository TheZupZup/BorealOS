---
# yamllint configuration for BorealOS.
# Tuned to keep CI workflows and config files clean without being noisy.
# https://yamllint.readthedocs.io/
extends: default

rules:
  # GitHub Actions uses the `on:` key, which YAML parses as a boolean.
  # Don't lint mapping keys for truthiness so workflows stay clean.
  truthy:
    check-keys: false
  # Long lines in workflows/configs are tolerated (reported, not failed).
  line-length:
    max: 100
    level: warning
  # GitHub workflow files conventionally omit the leading `---`.
  document-start: disable
  comments:
    min-spaces-from-content: 1
